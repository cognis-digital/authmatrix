apiVersion: apps/v1
kind: Deployment
metadata: { name: authmatrix, labels: { app: authmatrix } }
spec:
  replicas: 1
  selector: { matchLabels: { app: authmatrix } }
  template:
    metadata: { labels: { app: authmatrix } }
    spec:
      containers:
        - name: authmatrix
          image: ghcr.io/cognis-digital/authmatrix:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: authmatrix }
spec:
  selector: { app: authmatrix }
  ports: [{ port: 80, targetPort: 8000 }]
